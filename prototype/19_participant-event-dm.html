<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DM - 参加者専用ページ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    body {
      color: var(--color-neutral-solid-gray-800);
      background: var(--color-neutral-white);
      padding-bottom: 94px; /* 入力バー(84px) + 余白 */
    }

    /* ── DM メッセージ一覧 ── */
    .dm-messages {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 16px;
      background: var(--color-neutral-white);
      min-height: calc(100vh - 49px - 160px); /* navBar - footer */
    }

    .dm-message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .dm-message__avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-neutral-solid-gray-900);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-neutral-white);
    }

    .dm-message__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dm-message__meta {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-400);
    }

    .dm-message__bubble {
      display: inline-block;
      max-width: 280px;
      padding: 12px 16px;
      background: var(--color-neutral-white);
      border-radius: 4px 12px 12px 12px;
      border: 1px solid var(--color-neutral-solid-gray-200);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-700);
      line-height: 1.625;
    }

    /* ── メッセージ入力バー ── */
    .dm-input-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      background: var(--color-neutral-white);
      border-top: 1px solid var(--color-neutral-solid-gray-100);
      padding: 12px 16px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-sizing: border-box;
      z-index: 50;
    }

    .dm-input-bar__field {
      flex: 1;
      padding: 12px 20px;
      background: var(--color-neutral-solid-gray-50);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--color-neutral-solid-gray-700);
      outline: none;
      height: 48px;
      box-sizing: border-box;
    }

    .dm-input-bar__field::placeholder {
      color: var(--color-neutral-solid-gray-400);
    }

    .dm-input-bar__field:focus {
      border-color: var(--color-neutral-solid-gray-400);
    }

    .dm-input-bar__send {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--color-neutral-solid-gray-900);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-neutral-white);
      box-shadow: 0 4px 6px -4px rgba(0,0,0,0.10), 0 10px 15px -3px rgba(0,0,0,0.10);
    }
  </style>
</head>
<body>

  <!-- ナビバー -->
  <div class="nav-bar">
    <a class="nav-back" href="javascript:history.back();" aria-label="戻る">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <p class="nav-title">参加者専用ページ</p>
    <div class="nav-spacer"></div>
  </div>

  <!-- DM メッセージ -->
  <main class="dm-messages" aria-label="メッセージ一覧">

    <div class="dm-message">
      <div class="dm-message__avatar" aria-label="主催者">主催</div>
      <div class="dm-message__content">
        <span class="dm-message__meta">田中コーチ · 3日前</span>
        <p class="dm-message__bubble">当日が楽しみですね！何か質問があれば気軽にどうぞ。</p>
      </div>
    </div>

    <div class="dm-message">
      <div class="dm-message__avatar" aria-label="主催者">主催</div>
      <div class="dm-message__content">
        <span class="dm-message__meta">田中コーチ · 1日前</span>
        <p class="dm-message__bubble">明日の集合は13:45です。よろしくお願いします！</p>
      </div>
    </div>

  </main>

  <!-- メッセージ入力バー -->
  <div class="dm-input-bar" role="form" aria-label="メッセージ入力">
    <input
      class="dm-input-bar__field"
      type="text"
      placeholder="メッセージを入力..."
      aria-label="メッセージ"
    >
    <button class="dm-input-bar__send" type="button" aria-label="送信">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>


  <script src="prototype-map.js"></script>
</body>
</html>
