<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>支払い方法を認証</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/button/button.css">
  <style>
    html {
      background: #d0d0d0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--color-neutral-solid-gray-50);
      margin: 0 auto;
      max-width: 390px;
      color: var(--color-neutral-solid-gray-900);
      min-height: 100vh;
      box-shadow: 0 0 16px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    /* ── ナビバー ── */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      padding: 14px 16px;
      border-bottom: 1px solid var(--color-neutral-solid-gray-200);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--color-neutral-solid-gray-800);
      text-decoration: none;
    }

    .nav-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      margin: 0;
      flex: 1;
      text-align: center;
    }

    .nav-spacer {
      width: 24px;
    }

    /* ── メインコンテンツ ── */
    .main {
      flex: 1;
      padding: 80px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 48px;
    }

    /* ── ロゴコネクター ── */
    .auth-logos {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-circle--app {
      background: linear-gradient(135deg, var(--color-primitive-orange-400) 0%, var(--color-primitive-orange-700) 100%);
      box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.10), 0px 4px 6px -4px rgba(0, 0, 0, 0.10);
    }

    .logo-circle--paypay {
      background: #FF0033;
      box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.10), 0px 4px 6px -4px rgba(0, 0, 0, 0.10);
      overflow: hidden;
      position: relative;
    }

    .logo-circle--paypay::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 9999px;
      border: 4px solid rgba(255, 255, 255, 0.20);
      pointer-events: none;
    }

    .logo-dots {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: var(--color-neutral-solid-gray-420);
    }

    .paypay-letter {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      font-style: italic;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* ── テキストコンテンツ ── */
    .auth-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 280px;
      width: 100%;
    }

    .auth-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      text-align: center;
      margin: 0;
      line-height: 1.6;
    }

    .auth-body {
      font-size: 14px;
      color: var(--color-neutral-solid-gray-600);
      text-align: center;
      margin: 0;
      line-height: 1.7;
      padding: 0 16px;
    }

    /* ── フッター ── */
    .auth-footer {
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      border-top: 1px solid var(--color-neutral-solid-gray-100);
    }

    .auth-footer .dads-button {
      width: 100%;
      justify-content: center;
    }

    .security-note {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .security-note__text {
      font-size: 12px;
      color: var(--color-neutral-solid-gray-600);
      margin: 0;
    }
  </style>
  <script>
    setTimeout(function() {
      window.location.href = "12_paypay-auth-terms.html";
    }, 3000);
  </script>
</head>
<body>

  <!-- ナビバー -->
  <div class="nav-bar">
    <a class="nav-back" href="07_payment.html#paypay" aria-label="閉じる">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6L18 18"/>
      </svg>
    </a>
    <p class="nav-title">支払い方法を認証</p>
    <div class="nav-spacer"></div>
  </div>

  <!-- メインコンテンツ -->
  <main class="main">

    <!-- ロゴコネクター -->
    <div class="auth-logos">

      <!-- Hoistle アプリロゴ -->
      <div class="logo-circle logo-circle--app" aria-label="Hoistle">
        <svg width="32" height="32" viewBox="0 -960 960 960" fill="white" aria-hidden="true">
          <path d="M200-200v-560 560Zm0 80q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v100h-80v-100H200v560h560v-100h80v100q0 33-23.5 56.5T760-120H200Zm320-160q-33 0-56.5-23.5T440-360v-240q0-33 23.5-56.5T520-680h280q33 0 56.5 23.5T880-600v240q0 33-23.5 56.5T800-280H520Zm280-80v-240H520v240h280Zm-117.5-77.5Q700-455 700-480t-17.5-42.5Q665-540 640-540t-42.5 17.5Q580-505 580-480t17.5 42.5Q615-420 640-420t42.5-17.5Z"/>
        </svg>
      </div>

      <!-- 接続ドット -->
      <div class="logo-dots" aria-hidden="true">
        <div class="logo-dot"></div>
        <div class="logo-dot"></div>
        <div class="logo-dot"></div>
      </div>

      <!-- PayPay ロゴ -->
      <div class="logo-circle logo-circle--paypay" aria-label="PayPay">
        <span class="paypay-letter" aria-hidden="true">P</span>
      </div>

    </div>

    <!-- テキスト -->
    <div class="auth-content">
      <h1 class="auth-title">PayPayで認証を<br>完了してください</h1>
      <p class="auth-body">外部アプリケーションに移動して、<br>アカウント連携を行います。</p>
    </div>

  </main>

  <!-- フッター -->
  <footer class="auth-footer">
    <a href="07_payment.html#paypay" class="dads-button" data-size="lg" data-type="outline" role="button">キャンセル</a>
    <div class="security-note">
      <svg width="12" height="14" viewBox="0 0 12 14" fill="none" aria-hidden="true">
        <path d="M6 1L1 3.5V7C1 9.77 3.24 12.37 6 13C8.76 12.37 11 9.77 11 7V3.5L6 1Z" stroke="var(--color-neutral-solid-gray-600)" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M4 7L5.5 8.5L8 5.5" stroke="var(--color-neutral-solid-gray-600)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="security-note__text">セキュアな通信で保護されています</p>
    </div>
  </footer>

  <script src="prototype-map.js"></script>
</body>
</html>
