<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>試合詳細</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    /* スコアカード */
    .score-card {
      background: #1a1814;
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }


    .match-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .match-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .match-item__heading {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .match-item__number {
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
      color: var(--color-neutral-solid-gray-500);
    }

    .match-item__time {
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      color: var(--color-neutral-solid-gray-500);
    }

    .match-card {
      display: flex;
      flex-direction: column;
    }

    .match-card__top {
      padding: 16px;
      background: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .match-card__top--expanded {
      border-radius: 12px 12px 0 0;
      border-bottom: none;
    }

    .match-card__teams {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .match-team-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-white);
      flex-shrink: 0;
    }

    .match-team-icon--dark  { background: var(--color-neutral-solid-gray-700); }
    .match-team-icon--mid   { background: var(--color-neutral-solid-gray-400); }
    .match-team-icon--light { background: var(--color-neutral-solid-gray-300); }

    .match-card__score {
      font-size: 29px;
      font-weight: 700;
      line-height: 29px;
      color: var(--color-neutral-solid-gray-500);
    }

    .match-card__score--empty {
      opacity: 0.5;
    }

    .match-card__chevron {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .match-card__chevron img {
      transform: rotate(180deg);
      display: block;
    }

    .match-card__top--expanded .match-card__chevron img {
      transform: rotate(0deg);
    }

    .match-card__body {
      padding: 16px;
      background: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 0 0 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .match-section-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 16px;
      color: var(--color-neutral-solid-gray-900);
    }

    .match-score-detail {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .match-score-detail img {
      width: 100%;
      height: auto;
      display: block;
    }

    .match-box-score {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-box-score__team {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-box-score__team-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 14px;
      color: var(--color-neutral-solid-gray-900);
    }

    .match-box-score__scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .match-box-score__scroll img {
      height: 128px;
      width: auto;
      max-width: none;
      display: block;
    }

    .match-empty-state {
      width: 100%;
      padding: 16px 0;
      opacity: 0.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .match-empty-state__title {
      font-size: 12px;
      font-weight: 700;
      line-height: 12px;
      color: var(--color-neutral-solid-gray-900);
    }

    .match-empty-state__desc {
      font-size: 12px;
      font-weight: 400;
      line-height: 12px;
      color: var(--color-neutral-solid-gray-900);
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a class="nav-back" href="16_participant-event-ongoing.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      戻る
    </a>
    <h1 class="nav-title">試合詳細</h1>
    <div class="nav-spacer"></div>
  </nav>

  <main class="main" style="gap: 32px;">

    <!-- スコアカード -->
    <div class="score-card">
      <div class="score-card__status">
        <div class="live-badge">
          <div class="live-dot"></div>
          <span class="live-text">LIVE</span>
        </div>
        <span class="match-label">・第2試合</span>
      </div>

      <div class="score-display">
        <div class="score-team">
          <span class="score-team__name">チームA</span>
          <span class="score-team__num">3</span>
        </div>
        <span class="score-sep">:</span>
        <div class="score-team">
          <span class="score-team__name">チームB</span>
          <span class="score-team__num">2</span>
        </div>
      </div>

      <p class="score-card__time">残り 12分</p>
    </div>

    <!-- スケジュールセクション -->
    <section class="schedule-section">
      <div class="schedule-heading">
        <span class="schedule-heading__text">本日のスケジュール</span>
        <div class="schedule-heading__line"></div>
      </div>

      <div class="match-list">

        <!-- 第1試合（スコアあり・展開） -->
        <div class="match-item">
          <div class="match-item__heading">
            <span class="match-item__number">第1試合</span>
            <span class="match-item__time">09:00〜</span>
          </div>
          <div class="match-card">
            <div class="match-card__top match-card__top--expanded">
              <div class="match-card__teams">
                <div class="match-team-icon match-team-icon--dark">A</div>
                <span class="match-card__score">58 : 94</span>
                <div class="match-team-icon match-team-icon--mid">B</div>
              </div>
              <span class="match-card__chevron">
                <img src="../material/icon/up.svg" width="24" height="24" alt="">
              </span>
            </div>
            <div class="match-card__body">
              <div class="match-score-detail">
                <span class="match-section-title">スコア詳細</span>
                <img src="../material/screen/スコア詳細.png" alt="スコア詳細">
              </div>
              <div class="match-box-score">
                <span class="match-section-title">バックスコア</span>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームA</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームAバックスコア">
                  </div>
                </div>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームB</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームBバックスコア">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第2試合（スコアあり・折り畳み） -->
        <div class="match-item">
          <div class="match-item__heading">
            <span class="match-item__number">第2試合</span>
            <span class="match-item__time">10:00〜</span>
          </div>
          <div class="match-card">
            <div class="match-card__top">
              <div class="match-card__teams">
                <div class="match-team-icon match-team-icon--dark">A</div>
                <span class="match-card__score">83 : 80</span>
                <div class="match-team-icon match-team-icon--light">C</div>
              </div>
              <span class="match-card__chevron">
                <img src="../material/icon/up.svg" width="24" height="24" alt="">
              </span>
            </div>
            <div class="match-card__body">
              <div class="match-score-detail">
                <span class="match-section-title">スコア詳細</span>
                <img src="../material/screen/スコア詳細.png" alt="スコア詳細">
              </div>
              <div class="match-box-score">
                <span class="match-section-title">バックスコア</span>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームA</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームAバックスコア">
                  </div>
                </div>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームC</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームCバックスコア">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第3試合（スコアなし・展開・空状態） -->
        <div class="match-item">
          <div class="match-item__heading">
            <span class="match-item__number">第3試合</span>
            <span class="match-item__time">11:00〜</span>
          </div>
          <div class="match-card">
            <div class="match-card__top match-card__top--expanded">
              <div class="match-card__teams">
                <div class="match-team-icon match-team-icon--mid">B</div>
                <span class="match-card__score match-card__score--empty">00 : 00</span>
                <div class="match-team-icon match-team-icon--light">C</div>
              </div>
              <span class="match-card__chevron">
                <img src="../material/icon/up.svg" width="24" height="24" alt="">
              </span>
            </div>
            <div class="match-card__body">
              <div class="match-score-detail">
                <span class="match-section-title">スコア詳細</span>
                <div class="match-empty-state">
                  <span class="match-empty-state__title">スコアがありません</span>
                  <span class="match-empty-state__desc">試合が開始されると表示されます</span>
                </div>
              </div>
              <div class="match-box-score">
                <span class="match-section-title">バックスコア</span>
                <div class="match-empty-state">
                  <span class="match-empty-state__title">スコアがありません</span>
                  <span class="match-empty-state__desc">試合が開始されると表示されます</span>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.match-card__body').forEach(function(body) {
        body.style.display = 'none';
      });
      document.querySelectorAll('.match-card__top').forEach(function(top) {
        top.classList.remove('match-card__top--expanded');
        top.style.cursor = 'pointer';
        top.addEventListener('click', function() {
          var body = top.nextElementSibling;
          if (!body || !body.classList.contains('match-card__body')) return;
          var isOpen = body.style.display !== 'none';
          body.style.display = isOpen ? 'none' : '';
          top.classList.toggle('match-card__top--expanded', !isOpen);
        });
      });
    });
  </script>
  <script src="prototype-map.js"></script>
</body>
</html>
