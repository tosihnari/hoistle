<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>グループチャット</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    body {
      color: var(--color-neutral-solid-gray-800);
      background: var(--color-neutral-white);
      padding-bottom: 94px; /* 入力バー(84px) + 余白 */
    }

    /* ── DM メッセージ一覧 ── */
    .dm-messages {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 16px;
      background: var(--color-neutral-white);
      min-height: calc(100vh - 49px - 160px); /* navBar - footer */
    }

    .dm-message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .dm-message__avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--color-neutral-solid-gray-900);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-neutral-white);
    }

    .dm-message__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      display: block;
    }

    .dm-message__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dm-message__meta {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-400);
    }

    .dm-message__bubble {
      display: inline-block;
      max-width: 280px;
      padding: 12px 16px;
      background: var(--color-neutral-white);
      border-radius: 4px 12px 12px 12px;
      border: 1px solid var(--color-neutral-solid-gray-200);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-700);
      line-height: 1.625;
    }

    /* ── メッセージ入力バー ── */
    .dm-input-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      background: var(--color-neutral-white);
      border-top: 1px solid var(--color-neutral-solid-gray-100);
      padding: 12px 16px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-sizing: border-box;
      z-index: 50;
    }

    .dm-input-bar__field {
      flex: 1;
      padding: 12px 20px;
      background: var(--color-neutral-solid-gray-50);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--color-neutral-solid-gray-700);
      outline: none;
      height: 48px;
      box-sizing: border-box;
    }

    .dm-input-bar__field::placeholder {
      color: var(--color-neutral-solid-gray-400);
    }

    .dm-input-bar__field:focus {
      border-color: var(--color-neutral-solid-gray-400);
    }

    .dm-input-bar__send {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--color-neutral-solid-gray-900);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-neutral-white);
      box-shadow: 0 4px 6px -4px rgba(0,0,0,0.10), 0 10px 15px -3px rgba(0,0,0,0.10);
    }

    /* 自分のメッセージ */
    .dm-message--self {
      flex-direction: row-reverse;
    }
    .dm-message__content--self {
      align-items: flex-end;
    }
    .dm-message__bubble--self {
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      border: none;
      border-radius: 12px 4px 12px 12px;
    }

    /* 既読数ボタン */
    .dm-read-receipt {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      padding: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-400);
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      line-height: 1;
    }
    .dm-read-receipt:hover {
      color: var(--color-neutral-solid-gray-600);
    }

    /* 既読ユーザーリスト（sheet-body内） */
    .read-user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-neutral-solid-gray-100);
      text-decoration: none;
    }
    .read-user-item:last-child {
      border-bottom: none;
    }
    .read-user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .read-user-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .read-user-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .read-user-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-800);
    }
    .read-user-level {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-500);
      border: 1px solid var(--color-neutral-solid-gray-300);
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .read-user-context {
      font-size: 12px;
      font-weight: 400;
      color: var(--color-neutral-solid-gray-400);
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- ナビバー -->
  <div class="nav-bar">
    <a class="nav-back" href="javascript:history.back();" aria-label="戻る">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <p class="nav-title">グループチャット</p>
    <div class="nav-spacer"></div>
  </div>

  <!-- DM メッセージ -->
  <main class="dm-messages" aria-label="メッセージ一覧">

    <div class="dm-message">
      <div class="dm-message__avatar" aria-label="主催者"><img src="../material/user-icon/運営_男性2.png" alt="運営"></div>
      <div class="dm-message__content">
        <span class="dm-message__meta">運営· 3日前</span>
        <p class="dm-message__bubble">当日が楽しみですね！何か質問があれば気軽にどうぞ。</p>
      </div>
    </div>

    <div class="dm-message dm-message--self">
      <div class="dm-message__content dm-message__content--self">
        <span class="dm-message__meta">たった今</span>
        <p class="dm-message__bubble dm-message__bubble--self">明日の持ち物について質問です。屋内コートとのことですが、シューズは普通の運動靴でも大丈夫でしょうか？</p>
        <button class="dm-read-receipt" id="read-receipt-btn" type="button" aria-label="既読者を確認">既読 4<img src="../material/icon/arrow_right.svg" width="12" height="12" alt="" aria-hidden="true"></button>
      </div>
    </div>

  </main>

  <!-- メッセージ入力バー -->
  <div class="dm-input-bar" role="form" aria-label="メッセージ入力">
    <input
      class="dm-input-bar__field"
      type="text"
      placeholder="メッセージを入力..."
      aria-label="メッセージ"
    >
    <button class="dm-input-bar__send" type="button" aria-label="送信">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>


  <!-- 既読ユーザーハーフモーダル -->
  <dialog id="read-users-sheet" class="bottom-sheet" aria-labelledby="read-users-sheet-title">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <p class="sheet-title" id="read-users-sheet-title">既読 4</p>
      <button class="sheet-close" id="read-users-close" aria-label="閉じる">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <a href="ユーザープロフィール.html" class="read-user-item">
        <img class="read-user-avatar" src="../material/user-icon/Yusaku.Takasugi_高杉優作.png" alt="高杉優作">
        <div class="read-user-info">
          <div class="read-user-row">
            <span class="read-user-name">高杉 優作</span>
            <span class="read-user-level">放課後レベル</span>
          </div>
          <p class="read-user-context">5回同じイベントに参加しています</p>
        </div>
      </a>
      <a href="ユーザープロフィール.html" class="read-user-item">
        <img class="read-user-avatar" src="../material/user-icon/Hayato.Akaiwa_赤岩駿斗.png" alt="赤岩駿斗">
        <div class="read-user-info">
          <div class="read-user-row">
            <span class="read-user-name">赤岩 駿斗</span>
            <span class="read-user-level">放課後レベル</span>
          </div>
          <p class="read-user-context">3回同じイベントに参加しています</p>
        </div>
      </a>
      <a href="ユーザープロフィール.html" class="read-user-item">
        <img class="read-user-avatar" src="../material/user-icon/Mana.Kurita_栗田茉奈.png" alt="栗田茉奈">
        <div class="read-user-info">
          <div class="read-user-row">
            <span class="read-user-name">栗田 茉奈</span>
            <span class="read-user-level">放課後レベル</span>
          </div>
          <p class="read-user-context">2回同じイベントに参加しています</p>
        </div>
      </a>
      <a href="ユーザープロフィール.html" class="read-user-item">
        <img class="read-user-avatar" src="../material/user-icon/Hikaru.Tezuka_手塚光.png" alt="手塚光">
        <div class="read-user-info">
          <div class="read-user-row">
            <span class="read-user-name">手塚 光</span>
            <span class="read-user-level">放課後レベル</span>
          </div>
          <p class="read-user-context">はじめて同じイベントに参加します</p>
        </div>
      </a>
    </div>
  </dialog>

  <script>
    const readReceiptBtn = document.getElementById('read-receipt-btn');
    const readUsersSheet = document.getElementById('read-users-sheet');
    readReceiptBtn.addEventListener('click', () => readUsersSheet.showModal());
    document.getElementById('read-users-close').addEventListener('click', () => readUsersSheet.close());
    readUsersSheet.addEventListener('click', e => { if (e.target === readUsersSheet) readUsersSheet.close(); });
  </script>

  <script src="prototype-map.js"></script>
</body>
</html>
