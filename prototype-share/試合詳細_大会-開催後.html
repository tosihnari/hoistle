<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>試合詳細（開催後）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    /* 表彰カード */
    .award-card {
      background: var(--color-neutral-solid-gray-800);
      border-radius: 24px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.10), 0 8px 10px -6px rgba(0,0,0,0.10);
    }

    .award-trophy {
      text-align: center;
      font-size: 60px;
      line-height: 1;
      margin: 0;
    }

    .award-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .award-message__title {
      font-size: 24px;
      font-weight: 500;
      color: var(--color-neutral-white);
      line-height: 1.4;
      margin: 0;
      text-align: center;
    }

    .award-message__subtitle {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-300);
      line-height: 1.625;
      margin: 0;
      text-align: center;
    }

    /* MVP バッジ */
    .mvp-badge {
      align-self: stretch;
      background: var(--color-neutral-white);
      border-radius: 12px;
      border: 2px solid var(--color-neutral-solid-gray-200);
      padding: 6px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mvp-badge__label {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-500);
      line-height: 1.4;
      text-align: center;
    }

    .mvp-badge__row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mvp-badge__avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.25px solid var(--color-neutral-solid-gray-100);
      flex-shrink: 0;
    }

    .mvp-badge__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mvp-badge__name {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-800);
      line-height: 1.75;
    }

    /* 試合カード */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .match-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .match-item__heading {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .match-item__number {
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
      color: var(--color-neutral-solid-gray-500);
    }

    .match-item__time {
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      color: var(--color-neutral-solid-gray-500);
    }

    .match-card {
      display: flex;
      flex-direction: column;
    }

    .match-card__top {
      padding: 16px;
      background: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .match-card__top--expanded {
      border-radius: 12px 12px 0 0;
      border-bottom: none;
    }

    .match-card__teams {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .match-team-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-white);
      flex-shrink: 0;
    }

    .match-team-icon--dark  { background: var(--color-neutral-solid-gray-700); }
    .match-team-icon--mid   { background: var(--color-neutral-solid-gray-400); }
    .match-team-icon--light { background: var(--color-neutral-solid-gray-300); }

    .match-card__score {
      font-size: 29px;
      font-weight: 700;
      line-height: 29px;
      color: var(--color-neutral-solid-gray-500);
    }

    .match-card__chevron {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .match-card__chevron img {
      transform: rotate(180deg);
      display: block;
    }

    .match-card__top--expanded .match-card__chevron img {
      transform: rotate(0deg);
    }

    .match-card__body {
      padding: 16px;
      background: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 0 0 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .match-section-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 16px;
      color: var(--color-neutral-solid-gray-900);
    }

    .match-score-detail {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .match-score-detail img {
      width: 100%;
      height: auto;
      display: block;
    }

    .match-box-score {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-box-score__team {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-box-score__team-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 14px;
      color: var(--color-neutral-solid-gray-900);
    }

    .match-box-score__scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .match-box-score__scroll img {
      height: 128px;
      width: auto;
      max-width: none;
      display: block;
    }

    /* 写真ベントーグリッド */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 148px 120px;
      gap: 8px;
    }

    .bento-cell {
      background: var(--color-neutral-solid-gray-100);
      border-radius: 12px;
      border: 1px solid var(--color-neutral-solid-gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bento-cell--main {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    .bento-cell img {
      width: 32px;
      height: 32px;
      opacity: 0.4;
    }

    .photo-more-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-700);
      text-decoration: none;
      padding-top: 4px;
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a class="nav-back" href="参加者専用_大会-開催後.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      戻る
    </a>
    <h1 class="nav-title">試合詳細</h1>
    <div class="nav-spacer"></div>
  </nav>

  <main class="main" style="gap: 32px;">

    <!-- 表彰カード -->
    <div class="award-card">
      <p class="award-trophy">🏆</p>
      <div class="award-message">
        <p class="award-message__title">チーム優勝おめでとう！</p>
        <p class="award-message__subtitle">全3試合 · 12名参加 最高の戦いでした</p>
      </div>
      <div class="mvp-badge">
        <span class="mvp-badge__label">本日のMVP</span>
        <div class="mvp-badge__row">
          <div class="mvp-badge__avatar">
            <img src="../material/user-icon/Toshinari.Asahi_旭俊成.png" alt="旭俊成">
          </div>
          <span class="mvp-badge__name">あなた（旭俊成）</span>
        </div>
      </div>
    </div>

    <!-- 全試合結果 -->
    <section class="schedule-section">
      <div class="schedule-heading">
        <span class="schedule-heading__text">全試合結果</span>
        <div class="schedule-heading__line"></div>
      </div>
      <div class="match-list">

        <!-- 第1試合（スコアあり・折り畳み） -->
        <div class="match-item">
          <div class="match-item__heading">
            <span class="match-item__number">第1試合</span>
          </div>
          <div class="match-card">
            <div class="match-card__top">
              <div class="match-card__teams">
                <div class="match-team-icon match-team-icon--dark">A</div>
                <span class="match-card__score">58 : 94</span>
                <div class="match-team-icon match-team-icon--mid">B</div>
              </div>
              <span class="match-card__chevron">
                <img src="../material/icon/up.svg" width="24" height="24" alt="">
              </span>
            </div>
            <div class="match-card__body">
              <div class="match-score-detail">
                <span class="match-section-title">スコア詳細</span>
                <img src="../material/screen/スコア詳細.png" alt="スコア詳細">
              </div>
              <div class="match-box-score">
                <span class="match-section-title">バックスコア</span>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームA</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームAバックスコア">
                  </div>
                </div>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームB</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームBバックスコア">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第2試合（スコアあり・折り畳み） -->
        <div class="match-item">
          <div class="match-item__heading">
            <span class="match-item__number">第2試合</span>
          </div>
          <div class="match-card">
            <div class="match-card__top">
              <div class="match-card__teams">
                <div class="match-team-icon match-team-icon--dark">A</div>
                <span class="match-card__score">83 : 80</span>
                <div class="match-team-icon match-team-icon--light">C</div>
              </div>
              <span class="match-card__chevron">
                <img src="../material/icon/up.svg" width="24" height="24" alt="">
              </span>
            </div>
            <div class="match-card__body">
              <div class="match-score-detail">
                <span class="match-section-title">スコア詳細</span>
                <img src="../material/screen/スコア詳細.png" alt="スコア詳細">
              </div>
              <div class="match-box-score">
                <span class="match-section-title">バックスコア</span>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームA</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームAバックスコア">
                  </div>
                </div>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームC</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームCバックスコア">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第3試合（スコアあり・折り畳み） -->
        <div class="match-item">
          <div class="match-item__heading">
            <span class="match-item__number">第3試合</span>
          </div>
          <div class="match-card">
            <div class="match-card__top">
              <div class="match-card__teams">
                <div class="match-team-icon match-team-icon--mid">B</div>
                <span class="match-card__score">58 : 94</span>
                <div class="match-team-icon match-team-icon--light">C</div>
              </div>
              <span class="match-card__chevron">
                <img src="../material/icon/up.svg" width="24" height="24" alt="">
              </span>
            </div>
            <div class="match-card__body">
              <div class="match-score-detail">
                <span class="match-section-title">スコア詳細</span>
                <img src="../material/screen/スコア詳細.png" alt="スコア詳細">
              </div>
              <div class="match-box-score">
                <span class="match-section-title">バックスコア</span>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームB</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームBバックスコア">
                  </div>
                </div>
                <div class="match-box-score__team">
                  <span class="match-box-score__team-name">チームC</span>
                  <div class="match-box-score__scroll">
                    <img src="../material/screen/バックスコア.png" alt="チームCバックスコア">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>


  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.match-card__body').forEach(function(body) {
        body.style.display = 'none';
      });
      document.querySelectorAll('.match-card__top').forEach(function(top) {
        top.classList.remove('match-card__top--expanded');
        top.style.cursor = 'pointer';
        top.addEventListener('click', function() {
          var body = top.nextElementSibling;
          if (!body || !body.classList.contains('match-card__body')) return;
          var isOpen = body.style.display !== 'none';
          body.style.display = isOpen ? 'none' : '';
          top.classList.toggle('match-card__top--expanded', !isOpen);
        });
      });
    });
  </script>
  <script src="prototype-map.js"></script>
</body>
</html>
