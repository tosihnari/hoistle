<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>参加者専用ページ（開催後）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/button/button.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    body {
      color: var(--color-neutral-solid-gray-800);
      padding-bottom: 120px;
    }

    /* ── ヒーローセクション（開催後バリアント）── */
    .event-hero__bg {
      background: var(--color-neutral-solid-gray-700);
      padding: 64px 20px 24px;
    }
    .event-hero__title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-neutral-white);
      margin: 0;
      line-height: 1.4;
    }
    .event-hero__card {
      margin: 16px 0 0;
      position: relative;
      z-index: 1;
      background: var(--color-neutral-white);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 10px -6px rgba(0,0,0,0.10), 0 20px 25px -5px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 開催後カード内部要素 */
    .post-event-trophy {
      text-align: center;
      font-size: 60px;
      line-height: 1;
      margin: 0;
    }
    .post-event-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .post-event-message__title {
      font-size: 24px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-900);
      line-height: 1.4;
      margin: 0;
      text-align: center;
    }
    .post-event-message__subtitle {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-500);
      line-height: 1.625;
      margin: 0;
      text-align: center;
    }
    .mvp-badge {
      align-self: stretch;
      background: var(--color-neutral-solid-gray-50);
      border-radius: 12px;
      border: 1px solid var(--color-neutral-solid-gray-200);
      padding: 16px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .mvp-badge__bg-icon {
      position: absolute;
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 80px;
      height: 80px;
      opacity: 0.12;
      pointer-events: none;
      filter: brightness(0);
    }
    .mvp-badge__bg-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .event-card-divider {
      border: none;
      border-top: 1px solid var(--color-neutral-solid-gray-200);
      margin: 0;
      align-self: stretch;
    }
    .mvp-badge__avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .mvp-badge__avatar-link {
      display: block;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      outline: 2px solid var(--color-neutral-solid-gray-900);
      outline-offset: -2px;
    }
    .mvp-badge__avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
    }
    .mvp-badge__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .mvp-badge__crown {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      background: var(--color-neutral-solid-gray-900);
      border-radius: 50%;
      border: 1px solid var(--color-neutral-white);
      color: var(--color-neutral-white);
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mvp-badge__info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .mvp-badge__label {
      font-size: 10px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      padding: 2px 8px;
      border-radius: 9999px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .mvp-badge__name {
      font-size: 16px;
      font-weight: 400;
      color: var(--color-neutral-solid-gray-900);
      line-height: 1.5;
    }
    .mvp-badge__score {
      font-size: 14px;
      color: var(--color-neutral-solid-gray-500);
      line-height: 1.5;
    }

    /* 表彰台 */
    .podium {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .podium__place {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .podium__rank {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-500);
      line-height: 1.4;
    }
    .podium__avatar-link {
      display: block;
      border-radius: 50%;
      overflow: hidden;
    }
    .podium__avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      outline: 1px solid var(--color-neutral-solid-gray-300);
      outline-offset: -1px;
    }
    .podium__avatar--1st {
      width: 96px;
      height: 96px;
      outline: 3px solid var(--color-neutral-solid-gray-900);
    }
    .podium__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .podium__name {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-800);
      text-align: center;
      line-height: 1.4;
    }
    .podium__score {
      font-size: 14px;
      color: var(--color-neutral-solid-gray-500);
      text-align: center;
      line-height: 1.4;
    }
    .podium__place--1st .podium__name {
      font-size: 16px;
    }
    .podium__place--1st .podium__score {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
    }

    /* イベント詳細ナビゲーション */
    .event-detail-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--color-neutral-white);
      text-decoration: none;
      color: var(--color-neutral-solid-gray-800);
    }
    .event-detail-nav__label {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-800);
    }

    /* 試合カード */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .match-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .match-item__heading {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .match-item__number {
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
      color: var(--color-neutral-solid-gray-500);
    }
    .match-card {
      display: flex;
      flex-direction: column;
    }
    .match-card__top {
      padding: 10px 12px;
      background: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .match-card__top--expanded {
      border-radius: 12px 12px 0 0;
      border-bottom: none;
    }
    .match-card__teams {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .match-team-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      min-width: 20px;
      flex-shrink: 0;
    }
    .match-team-icon--dark  { color: var(--color-neutral-solid-gray-900); }
    .match-team-icon--mid   { color: var(--color-neutral-solid-gray-600); }
    .match-team-icon--light { color: var(--color-neutral-solid-gray-400); }
    .match-card__score {
      font-size: 20px;
      font-weight: 700;
      line-height: 20px;
      color: var(--color-neutral-solid-gray-500);
    }
    .match-card__chevron {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .match-card__chevron img {
      transform: rotate(180deg);
      display: block;
    }
    .match-card__top--expanded .match-card__chevron img {
      transform: rotate(0deg);
    }
    .match-card__body {
      padding: 16px;
      background: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 0 0 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .match-section-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 16px;
      color: var(--color-neutral-solid-gray-900);
    }
    .match-score-detail {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .match-score-detail img {
      width: 100%;
      height: auto;
      display: block;
    }
    .match-box-score {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .match-box-score__team {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .match-box-score__team-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 14px;
      color: var(--color-neutral-solid-gray-900);
    }
    .match-box-score__scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .match-box-score__scroll img {
      height: 128px;
      width: auto;
      max-width: none;
      display: block;
    }

    /* 写真ギャラリー */
    .photo-section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .photo-section-heading .section-title {
      margin: 0;
    }
    .photo-section-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .photo-selected-count {
      display: none;
      padding: 6px 10px;
      border-radius: 9999px;
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .photo-selected-count.is-visible {
      display: inline-flex;
    }
    .photo-select-btn.dads-button {
      --button-color: var(--color-neutral-solid-gray-800);
      --button-hover-color: var(--color-neutral-solid-gray-900);
      --button-active-color: var(--color-neutral-black);
      --button-outline-hover-bg-color: var(--color-neutral-solid-gray-50);
      --button-outline-active-bg-color: var(--color-neutral-solid-gray-100);
      min-width: 72px;
      height: 40px;
      padding: 0 16px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .photo-grid__item {
      position: relative;
      aspect-ratio: 1 / 1;
      padding: 0;
      border: none;
      background: var(--color-neutral-solid-gray-100);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }
    .photo-grid__item::before,
    .photo-grid__item::after {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .photo-grid--selecting .photo-grid__item::after {
      content: "";
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border: 2px solid var(--color-neutral-white);
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      box-sizing: border-box;
      opacity: 1;
    }
    .photo-grid--selecting .photo-grid__item.is-selected::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.32);
      opacity: 1;
    }
    .photo-grid--selecting .photo-grid__item.is-selected::after {
      content: "✓";
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      font-size: 14px;
      font-weight: 700;
      opacity: 1;
    }
    .photo-grid__item:focus-visible {
      outline: 3px solid var(--color-neutral-black);
      outline-offset: 2px;
    }
    .photo-grid__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-more-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border-radius: 8px;
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .photo-selection-footer {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 120;
      width: 100%;
      max-width: 390px;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      background: var(--color-neutral-white);
      box-shadow: 0 -8px 24px rgba(0,0,0,0.14);
      box-sizing: border-box;
      transform: translate(-50%, 110%);
      transition: transform 0.28s ease;
    }
    .photo-selection-footer.is-visible {
      transform: translate(-50%, 0);
    }
    .photo-selection-footer__actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .photo-selection-footer__btn.dads-button {
      --button-color: var(--color-neutral-solid-gray-800);
      --button-hover-color: var(--color-neutral-solid-gray-900);
      --button-active-color: var(--color-neutral-black);
      --button-outline-hover-bg-color: var(--color-neutral-solid-gray-50);
      --button-outline-active-bg-color: var(--color-neutral-solid-gray-100);
      width: 100%;
      height: 48px;
      border-radius: 8px;
      font-size: 14px;
    }
    .photo-selection-footer__btn img {
      width: 18px;
      height: 18px;
    }
    /* 参加者チーム（prototype.css に未定義） */
    .participant-teams {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .participant-team__label {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-600);
      margin: 0 0 8px;
      line-height: 1.5;
    }
    .participant-teams .participant-avatars {
      flex-wrap: wrap;
      overflow-x: visible;
      gap: 8px;
    }
    .participant-teams .participant-avatar {
      width: 40px;
      height: 40px;
      box-shadow: none;
      outline: 1px solid var(--color-neutral-solid-gray-200);
      outline-offset: -1px;
    }

    /* フィルターチップ クリック時スクロール位置補正 */
    #section-participants, #section-photos {
      scroll-margin-top: 44px;
    }

    /* === 写真モーダル === */
    .photo-modal {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: none;
      height: 100dvh;
      max-height: none;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }
    .photo-modal::backdrop { background: rgba(0,0,0,0.72); }
    .photo-modal:not([open]) { display: none; }
    .photo-modal__media {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 48px);
      max-width: 342px;
      background: var(--color-neutral-solid-gray-900);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .photo-modal__img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
      background: var(--color-neutral-solid-gray-900);
    }
    @media (max-height: 720px) {
      .photo-modal__media {
        top: 42%;
        width: calc(100% - 64px);
        max-width: 318px;
      }
    }
    .photo-modal__close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-neutral-white);
      padding: 0;
    }
    .photo-modal__body {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 342px;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
      z-index: 1;
    }
    .photo-modal__actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .photo-modal__action.dads-button {
      --button-color: var(--color-neutral-solid-gray-800);
      --button-hover-color: var(--color-neutral-solid-gray-900);
      --button-active-color: var(--color-neutral-black);
      --button-outline-hover-bg-color: var(--color-neutral-solid-gray-50);
      --button-outline-active-bg-color: var(--color-neutral-solid-gray-100);
      width: 100%;
      height: 44px;
      border-radius: 8px;
      font-size: 14px;
      background: rgba(255,255,255,0.88);
    }
    .photo-modal__action img {
      width: 18px;
      height: 18px;
    }
    .photo-carousel {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .photo-carousel__thumb {
      width: 64px;
      height: 64px;
      padding: 0;
      flex: 0 0 auto;
      border: none;
      border-radius: 6px;
      overflow: hidden;
      background: var(--color-neutral-solid-gray-100);
      cursor: pointer;
    }
    .photo-carousel__thumb[aria-current="true"] {
      outline: 3px solid var(--color-neutral-solid-gray-900);
      outline-offset: -3px;
    }
    .photo-carousel__thumb:focus-visible {
      outline: 3px solid var(--color-neutral-black);
      outline-offset: 2px;
    }
    .photo-carousel__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* === アプリDLモーダル === */
    .app-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 48px);
      max-width: 342px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 20px;
      background: var(--color-neutral-white);
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .app-modal::backdrop { background: rgba(0,0,0,0.5); }
    .app-modal:not([open]) { display: none; }
    .app-modal__img-wrap {
      position: relative;
      height: 200px;
      overflow: hidden;
    }
    .app-modal__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .app-modal__img-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, var(--color-neutral-white) 0%, rgba(255,255,255,0) 50%);
    }
    .app-modal__close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-neutral-white);
      padding: 0;
    }
    .app-modal__body {
      padding: 16px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .app-modal__title {
      margin: 0;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.4;
      text-align: center;
      color: var(--color-neutral-solid-gray-900);
    }
    .app-modal__desc {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      text-align: center;
      color: var(--color-neutral-solid-gray-600);
    }
    .app-modal__badge {
      padding: 5px;
      color: var(--color-neutral-solid-gray-700);
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      text-align: center;
    }
    .app-modal__dl-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      background: var(--color-neutral-solid-gray-900);
      border: none;
      color: var(--color-neutral-white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
  <script src="auth.js"></script>
</head>
<body>


  <!-- ヒーロー（開催後） -->
  <div class="event-hero">
    <div class="event-hero__bg" data-category="スクール">
      <a class="event-hero__back" href="javascript:history.back()" aria-label="戻る">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>

  <script>
    // フィルターチップ scroll-sync
    const chips = document.querySelectorAll('.filter-chip');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('filter-chip--active'));
        chip.classList.add('filter-chip--active');
        const target = document.getElementById(chip.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    const sectionEls = Array.from(chips)
      .map(c => document.getElementById(c.dataset.target))
      .filter(Boolean);

    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          chips.forEach(c => c.classList.remove('filter-chip--active'));
          const active = document.querySelector(`.filter-chip[data-target="${id}"]`);
          if (active) active.classList.add('filter-chip--active');
        }
      });
    }, { rootMargin: '-10% 0px -80% 0px' });

    sectionEls.forEach(s => io.observe(s));

    // 写真モーダル
    const photoModal = document.getElementById('photo-modal');
    const photoModalImg = document.getElementById('photo-modal-img');
    const photoItems = Array.from(document.querySelectorAll('.photo-grid__item'));
    const photoThumbs = Array.from(document.querySelectorAll('.photo-carousel__thumb'));
    const photoGrid = document.querySelector('.photo-grid');
    const photoSelectToggle = document.getElementById('photo-select-toggle');
    const photoSelectedCount = document.getElementById('photo-selected-count');
    const photoSelectionFooter = document.getElementById('photo-selection-footer');
    const selectedPhotos = new Set();
    let isPhotoSelectMode = false;

    function setActivePhoto(index) {
      const item = photoItems[index];
      if (!item) return;
      const img = item.querySelector('img');
      photoModalImg.src = img.src;
      photoModalImg.alt = img.alt;
      photoThumbs.forEach(thumb => {
        thumb.setAttribute('aria-current', thumb.dataset.photoIndex === String(index));
      });
      photoThumbs[index]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function updatePhotoSelectionUI() {
      const selectedCount = selectedPhotos.size;
      photoGrid.classList.toggle('photo-grid--selecting', isPhotoSelectMode);
      photoSelectToggle.textContent = isPhotoSelectMode ? 'キャンセル' : '選択';
      photoSelectToggle.setAttribute('aria-pressed', String(isPhotoSelectMode));
      photoSelectedCount.textContent = selectedCount + '枚選択中';
      photoSelectedCount.classList.toggle('is-visible', selectedCount > 0);
      photoSelectionFooter.classList.toggle('is-visible', isPhotoSelectMode && selectedCount > 0);
      photoSelectionFooter.setAttribute('aria-hidden', String(!(isPhotoSelectMode && selectedCount > 0)));
      photoItems.forEach(item => {
        const isSelected = selectedPhotos.has(item.dataset.photoIndex);
        item.classList.toggle('is-selected', isSelected);
        item.setAttribute('aria-pressed', String(isSelected));
      });
    }

    function clearPhotoSelection() {
      selectedPhotos.clear();
      updatePhotoSelectionUI();
    }

    photoSelectToggle.addEventListener('click', () => {
      isPhotoSelectMode = !isPhotoSelectMode;
      if (!isPhotoSelectMode) clearPhotoSelection();
      updatePhotoSelectionUI();
    });

    photoItems.forEach(item => {
      item.addEventListener('click', () => {
        if (isPhotoSelectMode) {
          const index = item.dataset.photoIndex;
          if (selectedPhotos.has(index)) {
            selectedPhotos.delete(index);
          } else {
            selectedPhotos.add(index);
          }
          updatePhotoSelectionUI();
          return;
        }
        setActivePhoto(Number(item.dataset.photoIndex));
        photoModal.showModal();
      });
    });

    photoThumbs.forEach(thumb => {
      thumb.addEventListener('click', () => {
        setActivePhoto(Number(thumb.dataset.photoIndex));
      });
    });

    document.getElementById('photo-modal-close').addEventListener('click', () => photoModal.close());
    photoModal.addEventListener('click', e => { if (e.target === photoModal) photoModal.close(); });

    // アプリDLモーダル
    const appModal = document.getElementById('app-modal');
    document.getElementById('open-app-modal').addEventListener('click', () => appModal.showModal());
    document.getElementById('app-modal-close').addEventListener('click', () => appModal.close());
    appModal.addEventListener('click', e => { if (e.target === appModal) appModal.close(); });
  </script>
