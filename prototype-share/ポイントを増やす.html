<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ポイントを増やす</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    body {
      background: var(--color-neutral-solid-gray-50);
      padding-bottom: 80px;
      color: var(--color-neutral-solid-gray-900);
    }

    /* ── 保有ポイントヒーロー ── */
    .points-hero-section {
      background: var(--color-neutral-white);
      padding: 32px 16px 16px;
    }

    .point-hero {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 0 0 32px;
    }

    .point-hero__label {
      font-size: 18px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-900);
      line-height: 24px;
    }

    .point-hero__amount {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .point-badge {
      width: 24px;
      height: 24px;
      border-radius: 9999px;
      background: var(--color-neutral-solid-gray-300);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--color-neutral-white);
      flex-shrink: 0;
    }

    .point-hero__num {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      line-height: 28px;
    }

    /* ── ポイントカード ── */
    .points-card-wrap {
      padding: 0;
    }

    .points-card {
      background: var(--color-neutral-white);
      border-radius: 8px;
      outline: 1px solid var(--color-neutral-solid-gray-100);
      outline-offset: -1px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .points-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .points-top-row > span {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-neutral-solid-gray-900);
    }

    .points-amount {
      display: flex;
      align-items: baseline;
      gap: 1px;
    }

    .points-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      line-height: 1.25;
    }

    .points-unit {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
    }

    .points-divider {
      border: none;
      border-top: 1px solid var(--color-neutral-solid-gray-100);
      margin: 0;
    }

    .referral-row {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .referral-row__icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .referral-row__text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .referral-row__text strong {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      line-height: 1.5;
    }

    .referral-row__text span {
      font-size: 12px;
      font-weight: 400;
      color: var(--color-neutral-solid-gray-900);
      line-height: 1.5;
    }

    .referral-row__arrow {
      width: 14px;
      height: 14px;
      opacity: 0.35;
      flex-shrink: 0;
    }

    /* ── クーポンカード ── */
    .coupon-card-wrap {
      padding: 12px 0 0;
    }

    .coupon-card {
      background: var(--color-neutral-solid-gray-900);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .coupon-card__icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }

    .coupon-card__text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .coupon-card__text strong {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-white);
      line-height: 1.5;
    }

    .coupon-card__text span {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-neutral-white);
      line-height: 1.5;
    }

    .coupon-card__arrow {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }

    /* ── ポイントを購入する ── */
    .purchase-section {
      background: var(--color-neutral-white);
      padding: 16px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .purchase-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-900);
      line-height: 1;
      margin: 0;
    }

    .purchase-list {
      display: flex;
      flex-direction: column;
    }

    .purchase-row {
      height: 72px;
      border-bottom: 1px solid var(--color-neutral-solid-gray-100);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .purchase-row__left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .purchase-badge {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      background: var(--color-neutral-solid-gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--color-neutral-white);
      flex-shrink: 0;
    }

    .purchase-row__info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .purchase-row__pt {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-neutral-solid-gray-900);
      line-height: 22px;
    }

    .purchase-row__deal {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-neutral-solid-gray-600);
      line-height: 16px;
      letter-spacing: 0.02em;
    }

    .purchase-btn {
      height: 40px;
      min-width: 100px;
      padding: 0 24px;
      background: var(--color-neutral-solid-gray-900);
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-neutral-white);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a class="nav-back" href="マイページ_通常.html" aria-label="戻る">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <h1 class="nav-title">ポイントを増やす</h1>
    <div class="nav-spacer"></div>
  </nav>

  <section class="points-hero-section" aria-label="ポイント情報">
    <!-- 保有ポイント表示 -->
    <div class="point-hero">
      <span class="point-hero__label">保有ポイント</span>
      <div class="point-hero__amount">
        <span class="point-badge" aria-hidden="true">P</span>
        <span class="point-hero__num">500</span>
      </div>
    </div>

    <!-- ポイントカード -->
    <div class="points-card-wrap">
      <div class="points-card">
        <a href="#" class="referral-row">
          <img class="referral-row__icon" src="../material/icon/share.svg" alt="" aria-hidden="true">
          <div class="referral-row__text">
            <strong>友達を招待してポイントを増やす</strong>
            <span>初参加で双方にポイント付与</span>
          </div>
          <img class="referral-row__arrow" src="../material/icon/arrow_right.svg" alt="" aria-hidden="true">
        </a>
      </div>
    </div>

    <!-- クーポンカード -->
    <div class="coupon-card-wrap">
      <a href="#" class="coupon-card">
        <img class="coupon-card__icon" src="../material/icon/wallet.svg" width="24" height="24" alt="" aria-hidden="true">
        <div class="coupon-card__text">
          <strong>クーポンコードを入力する</strong>
          <span>コード入力でポイントがもらえます</span>
        </div>
        <img class="coupon-card__arrow" src="../material/icon/arrow_right.svg" alt="" aria-hidden="true">
      </a>
    </div>
  </section>

  <!-- ポイントを購入する -->
  <section class="purchase-section" aria-label="ポイントを購入する">
    <h2 class="purchase-title">ポイントを購入する</h2>
    <div class="purchase-list" role="list">

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">

      <div class="purchase-row" role="listitem">

        <a href="#" class="purchase-btn">¥120</a>
      </div>

      <div class="purchase-row" role="listitem">

          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">300</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥300</a>
      </div>

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">540</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥540</a>
      </div>

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">730</span>
            <span class="purchase-row__deal">10ポイントお得</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥720</a>
      </div>

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">1,010</span>
            <span class="purchase-row__deal">30ポイントお得</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥980</a>
      </div>

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">2,060</span>
            <span class="purchase-row__deal">80ポイントお得</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥1,980</a>
      </div>

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">3,120</span>
            <span class="purchase-row__deal">140ポイントお得</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥2,980</a>
      </div>

      <div class="purchase-row" role="listitem">
        <div class="purchase-row__left">
          <div class="purchase-badge" aria-hidden="true">P</div>
          <div class="purchase-row__info">
            <span class="purchase-row__pt">5,240</span>
            <span class="purchase-row__deal">260ポイントお得</span>
          </div>
        </div>
        <a href="#" class="purchase-btn">¥4,980</a>
      </div>

    </div>
  </section>

</body>
</html>
