<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>チームメンバー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/button/button.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    body {
      background: var(--color-neutral-solid-gray-50);
      padding-bottom: 32px;
    }

    .nav-bar {
      min-height: 56px;
      padding: 8px 12px;
    }

    .nav-action {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--color-neutral-solid-gray-800);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-action:hover { background: var(--color-neutral-solid-gray-50); }
    .nav-action svg { width: 24px; height: 24px; }

    .members-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 32px;
    }

    .panel {
      background: var(--color-neutral-white);
      border-top: 1px solid var(--color-neutral-solid-gray-100);
      border-bottom: 1px solid var(--color-neutral-solid-gray-100);
      padding: 20px 16px;
    }

    .action-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .invite-button {
      width: 100%;
      justify-content: center;
      background: var(--color-neutral-black);
      border-color: var(--color-neutral-black);
      color: var(--color-neutral-white);
    }
    .invite-button:hover {
      background: var(--color-neutral-solid-gray-800);
      border-color: var(--color-neutral-solid-gray-800);
    }

    .invite-link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--color-neutral-solid-gray-100);
      border-radius: 8px;
      background: var(--color-neutral-solid-gray-50);
    }

    .invite-link-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .invite-link-label {
      color: var(--color-neutral-solid-gray-900);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.5;
    }

    .invite-link-url {
      color: var(--color-neutral-solid-gray-600);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-link-button {
      border: 1px solid var(--color-neutral-solid-gray-700);
      border-radius: 6px;
      background: var(--color-neutral-white);
      color: var(--color-neutral-solid-gray-800);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }
    .copy-link-button:hover {
      background: var(--color-neutral-solid-gray-100);
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0;
      padding-left: 10px;
      border-left: 4px solid var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-solid-gray-900);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.5;
    }

    .member-count {
      color: var(--color-neutral-solid-gray-600);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .member-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--color-neutral-solid-gray-100);
      border-radius: 10px;
      overflow: hidden;
      background: var(--color-neutral-white);
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--color-neutral-solid-gray-100);
      color: inherit;
      text-decoration: none;
    }
    .member-row:last-child { border-bottom: 0; }
    .member-row:hover { background: var(--color-neutral-solid-gray-50); }

    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: var(--color-neutral-solid-gray-100);
      overflow: hidden;
      flex-shrink: 0;
    }
    .member-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }

    .member-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .member-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .member-name {
      color: var(--color-neutral-solid-gray-900);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leader-label {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--color-neutral-solid-gray-700);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--color-neutral-solid-gray-800);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.45;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .row-arrow {
      width: 20px;
      height: 20px;
      color: var(--color-neutral-solid-gray-400);
      flex-shrink: 0;
    }
  </style>
</head>
