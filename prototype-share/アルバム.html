<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>アルバム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    body {
      background: var(--color-neutral-solid-gray-100);
    }

    /* nav-title の上書き（このページだけ 20px / 500） */
    .nav-title {
      font-size: 20px;
      font-weight: 500;
    }

    .album-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .album-photo {
      width: 100%;
      display: block;
      aspect-ratio: 390 / 715;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      width: 100%;
      height: 100%;
      max-width: 390px;
      max-height: 100%;
      padding: 0;
      border: none;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
    }
    .lightbox:not([open]) { display: none; }
    .lightbox::backdrop { background: transparent; }
    .lightbox__inner { display: flex; flex-direction: column; height: 100%; }
    .lightbox__header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .lightbox__close {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 0;
    }
    .lightbox__share { display: flex; gap: 8px; flex: 1; min-width: 0; }
    .lightbox__share-btn {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
    }
    .lightbox__share-btn--x   { background: #000; color: #fff; }
    .lightbox__share-btn--line { background: #06C755; color: #fff; }
    .lightbox__scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .lightbox__scroll-item { height: 100%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .lightbox__scroll-img { width: 100%; display: block; object-fit: contain; }
    .share-bar {
      padding: 16px;
      display: flex;
      gap: 8px;
    }
    .share-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }
    .share-btn--x { background: #000; color: #fff; }
    .share-btn--line { background: #06C755; color: #fff; }
    .album-photo { cursor: pointer; }
    .lightbox__thumbs {
      flex-shrink: 0;
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .lightbox__thumbs::-webkit-scrollbar { display: none; }
    .lightbox__thumb {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: opacity 0.15s, border-color 0.15s;
      background: none;
      padding: 0;
    }
    .lightbox__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .lightbox__thumb--active {
      border-color: #fff;
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- ナビバー -->
  <div class="nav-bar">
    <a class="nav-back" href="javascript:history.back()" aria-label="戻る">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <p class="nav-title">写真</p>
    <div class="nav-spacer"></div>
  </div>

  <!-- アルバム -->
  <div class="album-list">
    <img class="album-photo" src="../material/screen/写真.png" alt="カメラロール">
  </div>

  <!-- lightbox -->
  <dialog class="lightbox" id="lightbox" aria-label="写真拡大表示">
    <div class="lightbox__inner">
      <div class="lightbox__header">
        <button class="lightbox__close" id="lightbox-close" type="button" aria-label="閉じる">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6L6 18M6 6L18 18"/></svg>
        </button>
        <div class="lightbox__share">
          <a class="lightbox__share-btn lightbox__share-btn--x" href="https://twitter.com/intent/tweet?text=ホイッスルのイベント写真%F0%9F%8F%80" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.731-8.835L1.254 2.25H8.08l4.26 5.632 5.905-5.632Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X でシェア
          </a>
          <a class="lightbox__share-btn lightbox__share-btn--line" href="https://line.me/R/msg/text/?ホイッスルのイベント写真%F0%9F%8F%80" target="_blank" rel="noopener">
            LINE でシェア
          </a>
        </div>
      </div>
      <div class="lightbox__scroll" id="lightbox-scroll"></div>
      <div class="lightbox__thumbs" id="lightbox-thumbs"></div>
    </div>
  </dialog>

  <!-- SNSシェア -->
  <div class="share-bar">
    <a class="share-btn share-btn--x" href="https://twitter.com/intent/tweet?text=ホイッスルのイベント写真%F0%9F%8F%80" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.731-8.835L1.254 2.25H8.08l4.26 5.632 5.905-5.632Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X でシェア
    </a>
    <a class="share-btn share-btn--line" href="https://line.me/R/msg/text/?ホイッスルのイベント写真%F0%9F%8F%80" target="_blank" rel="noopener">
      LINE でシェア
    </a>
  </div>

  <script>
    const lightbox       = document.getElementById('lightbox');
    const lightboxScroll = document.getElementById('lightbox-scroll');
    const lightboxThumbs = document.getElementById('lightbox-thumbs');

    const albumSrcs = [
      '../material/screen/アルバム1.png',
      '../material/screen/アルバム2.png',
      '../material/screen/アルバム3.png',
      '../material/screen/アルバム4.png'
    ];
    const dummySrcs = Array.from({ length: 11 }, (_, i) => albumSrcs[i % albumSrcs.length]);
    const thumbSrcs = [...albumSrcs, ...dummySrcs];

    albumSrcs.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'lightbox__scroll-item';
      const el = document.createElement('img');
      el.src = src; el.alt = `写真${i + 1}`;
      el.className = 'lightbox__scroll-img';
      el.dataset.index = i;
      item.appendChild(el);
      lightboxScroll.appendChild(item);
    });

    thumbSrcs.forEach((src, i) => {
      const btn = document.createElement('button');
      btn.className = 'lightbox__thumb';
      btn.type = 'button';
      btn.setAttribute('aria-label', `写真 ${i + 1}`);
      const img = document.createElement('img');
      img.src = src; img.alt = '';
      btn.appendChild(img);
      lightboxThumbs.appendChild(btn);
    });

    function setActiveThumb(index) {
      Array.from(lightboxThumbs.children).forEach((btn, i) => {
        btn.classList.toggle('lightbox__thumb--active', i === index);
      });
      lightboxThumbs.children[index]?.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
    }

    Array.from(lightboxThumbs.children).forEach((btn, i) => {
      btn.addEventListener('click', () => {
        const target = Math.min(i, lightboxScroll.children.length - 1);
        lightboxScroll.children[target]?.scrollIntoView({ behavior: 'smooth' });
        setActiveThumb(i);
      });
    });

    document.querySelector('.album-photo').addEventListener('click', () => {
      lightbox.showModal();
      requestAnimationFrame(() => {
        lightboxScroll.children[0]?.scrollIntoView({ behavior: 'instant' });
        setActiveThumb(0);
      });
    });

    document.getElementById('lightbox-close').addEventListener('click', () => lightbox.close());
  </script>

  <script src="prototype-map.js"></script>
</body>
</html>
