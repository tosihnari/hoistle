<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>アルバム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="prototype.css">
  <style>
    html, body { height: 100%; }
    body {
      background: var(--color-neutral-solid-gray-100);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* nav-title の上書き（このページだけ 20px / 500） */
    .nav-title {
      font-size: 20px;
      font-weight: 500;
    }


    .album-wrapper {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .album-list {
      flex: 1;
      min-height: 0;
    }
    .album-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .album-cta {
      flex-shrink: 0;
      padding: 16px 24px 24px;
    }
    .album-cta-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      background: var(--color-neutral-solid-gray-900);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .lightbox {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      width: 100%;
      height: 100%;
      max-width: 390px;
      max-height: 100%;
      padding: 0;
      border: none;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
    }
    .lightbox:not([open]) { display: none; }
    .lightbox::backdrop { background: transparent; }
    .lightbox__inner { display: flex; flex-direction: column; height: 100%; }
    .lightbox__header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .lightbox__close {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 0;
    }
    .lightbox__share-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .lightbox__footer {
      flex-shrink: 0;
      display: flex;
      gap: 16px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .lightbox__footer img {
      filter: invert(1);
    }
    .lightbox__scroll {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .lightbox__scroll-img { width: 100%; max-height: 100%; display: block; object-fit: contain; }
    .share-bar {
      padding: 16px;
      display: flex;
      gap: 8px;
    }
    .share-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }
    .share-btn--x { background: #000; color: #fff; }
    .share-btn--line { background: #06C755; color: #fff; }
    .album-photo { cursor: pointer; }
    .lightbox__thumbs {
      flex-shrink: 0;
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(0,0,0,0.6);
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .lightbox__thumbs::-webkit-scrollbar { display: none; }
    .lightbox__thumb {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: opacity 0.15s, border-color 0.15s;
      background: none;
      padding: 0;
    }
    .lightbox__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .lightbox__thumb--active {
      border-color: #fff;
      opacity: 1;
    }

    /* === アプリDLモーダル === */
    .app-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 48px);
      max-width: 342px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .app-modal::backdrop { background: rgba(0,0,0,0.5); }
    .app-modal:not([open]) { display: none; }
    .app-modal__img-wrap {
      position: relative;
      height: 200px;
      overflow: hidden;
    }
    .app-modal__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .app-modal__img-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, #fff 0%, rgba(255,255,255,0) 50%);
    }
    .app-modal__close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 0;
    }
    .app-modal__body {
      padding: 16px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .app-modal__title {
      margin: 0;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.4;
      text-align: center;
      color: var(--color-neutral-solid-gray-900);
    }
    .app-modal__desc {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      text-align: center;
      color: var(--color-neutral-solid-gray-600);
    }
    .app-modal__badge {
      padding: 5px 5px;
      color:var(--color-neutral-solid-gray-700);;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      text-align: center;
    }
    .app-modal__dl-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      background: var(--color-neutral-solid-gray-900);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <!-- ナビバー -->
  <div class="nav-bar">
    <a class="nav-back" href="javascript:history.back()" aria-label="戻る">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <p class="nav-title">写真</p>
    <div class="nav-spacer"></div>
  </div>

  <!-- アルバム -->
  <div class="album-wrapper">
    <div class="album-list">
      <img class="album-photo" src="../material/screen/写真.png" alt="写真1">
    </div>
    <div class="album-cta">
      <button class="album-cta-btn" id="open-app-modal" type="button">写真をもっと見る</button>
    </div>
  </div>

  <!-- アプリDLモーダル -->
  <dialog class="app-modal" id="app-modal">
    <div class="app-modal__img-wrap">
      <img class="app-modal__img" src="../material/screen/モーダル_アプリ-DL.png" alt="">
      <div class="app-modal__img-fade"></div>
      <button class="app-modal__close" id="app-modal-close" type="button" aria-label="閉じる">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6L6 18M6 6L18 18"/></svg>
      </button>
    </div>
    <div class="app-modal__body">
      <p class="app-modal__title">アプリなら、<br>すべての写真が見れる！</p>
      <p class="app-modal__desc">アプリを無料ダウンロードして、<br>続きの写真をチェック！</p>
      <div class="app-modal__badge">\ 初回ダウンロードで<strong>500ポイント</strong>GET！ /</div>
      <button class="app-modal__dl-btn" type="button">今すぐアプリをダウンロード！</button>
    </div>
  </dialog>

  <!-- lightbox -->
  <dialog class="lightbox" id="lightbox" aria-label="写真拡大表示">
    <div class="lightbox__inner">
      <div class="lightbox__header">
        <button class="lightbox__close" id="lightbox-close" type="button" aria-label="閉じる">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6L6 18M6 6L18 18"/></svg>
        </button>
      </div>
      <div class="lightbox__scroll" id="lightbox-scroll"></div>
      <div class="lightbox__thumbs" id="lightbox-thumbs"></div>
      <div class="lightbox__footer">
        <button class="lightbox__share-btn" type="button">
          <img src="../material/icon/share.svg" alt="" width="20" height="20" aria-hidden="true">
          画像を共有
        </button>
        <button class="lightbox__share-btn" type="button">
          <img src="../material/icon/instagram_739244.svg" alt="" width="20" height="20" aria-hidden="true">
          Instagramで共有
        </button>
      </div>
    </div>
  </dialog>


  <script>
    const lightbox       = document.getElementById('lightbox');
    const lightboxScroll = document.getElementById('lightbox-scroll');
    const lightboxThumbs = document.getElementById('lightbox-thumbs');
    const albumPhotos    = Array.from(document.querySelectorAll('.album-photo'));

    const albumSrcs = ['../material/screen/アルバム1.png','../material/screen/アルバム2.png','../material/screen/アルバム3.png','../material/screen/アルバム4.png'];
    const dummySrcs = Array.from({ length: 8 }, (_, i) => albumSrcs[i % albumSrcs.length]);
    const thumbSrcs = [...albumSrcs, ...dummySrcs];

    albumSrcs.forEach((src, i) => {
      const el = document.createElement('img');
      el.src = src; el.alt = `写真 ${i + 1}`;
      el.className = 'lightbox__scroll-img';
      el.dataset.index = i;
      el.style.display = i === 0 ? 'block' : 'none';
      lightboxScroll.appendChild(el);
    });

    thumbSrcs.forEach((src, i) => {
      const btn = document.createElement('button');
      btn.className = 'lightbox__thumb';
      btn.type = 'button';
      btn.setAttribute('aria-label', `写真 ${i + 1}`);
      const img = document.createElement('img');
      img.src = src; img.alt = '';
      btn.appendChild(img);
      lightboxThumbs.appendChild(btn);
    });

    function showImage(index) {
      const clamped = Math.min(index, lightboxScroll.children.length - 1);
      Array.from(lightboxScroll.children).forEach((el, i) => {
        el.style.display = i === clamped ? 'block' : 'none';
      });
    }

    function setActiveThumb(index) {
      Array.from(lightboxThumbs.children).forEach((btn, i) => {
        btn.classList.toggle('lightbox__thumb--active', i === index);
      });
      lightboxThumbs.children[index]?.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
    }

    Array.from(lightboxThumbs.children).forEach((btn, i) => {
      btn.addEventListener('click', () => {
        showImage(i);
        setActiveThumb(i);
      });
    });

    albumPhotos.forEach((img, i) => {
      img.addEventListener('click', () => {
        lightbox.showModal();
        requestAnimationFrame(() => {
          showImage(i < albumSrcs.length ? i : 0);
          setActiveThumb(i < albumSrcs.length ? i : 0);
        });
      });
    });

    document.getElementById('lightbox-close').addEventListener('click', () => lightbox.close());

    // アプリDLモーダル
    const appModal = document.getElementById('app-modal');
    document.getElementById('open-app-modal').addEventListener('click', () => appModal.showModal());
    document.getElementById('app-modal-close').addEventListener('click', () => appModal.close());
    appModal.addEventListener('click', e => { if (e.target === appModal) appModal.close(); });
  </script>

  <script src="prototype-map.js"></script>
</body>
</html>
